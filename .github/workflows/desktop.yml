name: Build Desktop (Windows .exe)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to upload .exe to (e.g. v2.0.0)"
        required: true
        default: "v2.0.0"
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows NSIS installer
        working-directory: desktop
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built artifacts
        shell: pwsh
        run: Get-ChildItem desktop\dist-electron -Recurse | Where-Object { !$_.PSIsContainer }

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: desktop/dist-electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as Actions artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VoiceShift-Windows-Setup
          path: desktop/dist-electron/*.exe
          retention-days: 30
