name: Build VoiceShift.exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality tools
        run: pip install ruff

      - name: Syntax check (AST)
        run: python scripts/check_syntax.py

      - name: Whitespace / encoding check
        run: python scripts/check_whitespace.py

      - name: Ruff lint (errors, warnings, imports)
        run: ruff check src/ --select E,W,F --ignore E501

      - name: Smoke tests
        run: python scripts/smoke_test.py

  build:
    name: Build .exe
    needs: quality
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.9.0

      - name: Validate spec before build
        shell: python
        run: |
          import sys, pathlib, ast

          spec = pathlib.Path("VoiceShift.spec").read_text(encoding="utf-8")
          rthook = pathlib.Path("rthooks/rthook_fix_stdio.py").read_text(encoding="utf-8")
          errors = []

          # Stdlib modules that scipy imports at runtime via _docscrape / _axis_nan_policy
          DANGEROUS_STDLIB = {
              "pydoc", "inspect", "textwrap", "difflib", "doctest",
              "pprint", "reprlib", "dis", "opcode", "tokenize", "token", "ast",
          }

          # 1. collect_all must be used for numpy and scipy
          if 'collect_all("numpy")' not in spec and "collect_all('numpy')" not in spec:
              errors.append(
                  "spec must call collect_all('numpy'). "
                  "numpy>=1.23 lazy-loads submodules via __getattr__; any excluded "
                  "numpy.* submodule causes ModuleNotFoundError at runtime."
              )
          if 'collect_all("scipy")' not in spec and "collect_all('scipy')" not in spec:
              errors.append(
                  "spec must call collect_all('scipy'). "
                  "scipy triggers numpy lazy-loading via array_api_compat."
              )

          # 2. No numpy.*/scipy.* or dangerous stdlib modules in excludes block
          in_excludes = False
          for lineno, line in enumerate(spec.splitlines(), 1):
              stripped = line.strip()
              if "excludes=[" in line or "excludes = [" in line:
                  in_excludes = True
              if in_excludes:
                  if (stripped.startswith('"numpy.') or stripped.startswith("'numpy.") or
                      stripped.startswith('"scipy.') or stripped.startswith("'scipy.")):
                      errors.append(
                          f"Line {lineno}: numpy/scipy submodule in excludes: {stripped!r}. "
                          "NEVER exclude numpy.* or scipy.* — they use __getattr__ lazy loading."
                      )
                  for mod in DANGEROUS_STDLIB:
                      if stripped in (f'"{mod}"', f"'{mod}'", f'"{mod}",', f"'{mod}',"):
                          errors.append(
                              f"Line {lineno}: stdlib module '{mod}' in excludes. "
                              f"scipy._lib._docscrape imports it at runtime. "
                              f"Never exclude: {', '.join(sorted(DANGEROUS_STDLIB))}"
                          )
                  if stripped.startswith("]"):
                      in_excludes = False

          # 3. rthook must parse cleanly (no IndentationError)
          try:
              ast.parse(rthook, filename="rthooks/rthook_fix_stdio.py")
          except SyntaxError as e:
              errors.append(f"rthook_fix_stdio.py syntax error: {e}")

          # 4. rthook module-level code must not be indented
          for i, line in enumerate(rthook.splitlines(), 1):
              if not line.strip():
                  continue
              stripped = line.lstrip()
              if (stripped.startswith("import ") or stripped.startswith("if sys.")) and i <= 20:
                  indent = len(line) - len(stripped)
                  if indent > 0:
                      errors.append(
                          f"rthook_fix_stdio.py line {i}: module-level code indented "
                          f"({indent} spaces). All code must be at column 0."
                      )

          if errors:
              print("PRE-BUILD VALIDATION FAILED:")
              for e in errors:
                  print(f"  ERROR: {e}")
              sys.exit(1)

          print(f"OK: pre-build validation passed ({len(spec.splitlines())} spec lines checked)")

      - name: Build .exe
        run: pyinstaller VoiceShift.spec --noconfirm --clean

      - name: Verify output size
        shell: pwsh
        run: |
          $exe = Get-Item dist\VoiceShift.exe
          $sizeMB = [math]::Round($exe.length / 1MB, 1)
          Write-Host "Build size: $sizeMB MB"
          if ($exe.length -lt 10MB) {
            Write-Error "FAIL: exe is suspiciously small ($sizeMB MB) — build may have failed silently"
            exit 1
          }
          Write-Host "OK: VoiceShift.exe built successfully ($sizeMB MB)"

      - name: Runtime smoke test
        shell: pwsh
        run: |
          # Start the exe and wait up to 8 seconds.
          # If it exits before the timeout:        -> it crashed at startup (FAIL)
          # If it is still running after 8 seconds -> it started successfully (PASS), kill it
          #
          # Why 8 seconds: GUI app with PyQt6 + audio init takes ~2-4 s on a fresh runner.
          # A startup crash (import error, missing module) always exits within 1-2 s.
          Write-Host "Starting VoiceShift.exe for runtime smoke test..."
          $proc = Start-Process -FilePath "dist\VoiceShift.exe" -PassThru -WindowStyle Hidden

          $timeout = 8   # seconds to wait
          $interval = 0.5
          $elapsed  = 0

          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            $proc.Refresh()
            if ($proc.HasExited) {
              $code = $proc.ExitCode
              Write-Error ("RUNTIME SMOKE TEST FAILED: exe exited after {0:N1}s with code {1}." -f $elapsed, $code)
              Write-Error "This usually means a missing module (ModuleNotFoundError) or early crash."
              Write-Error "Check the previous build log for traceback details."
              exit 1
            }
          }

          Write-Host ("OK: exe still running after {0}s — startup succeeded. Stopping." -f $timeout)
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Write-Host "RUNTIME SMOKE TEST PASSED"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "VoiceShift ${{ github.ref_name }}"
          body: |
            ## VoiceShift ${{ github.ref_name }}

            Portable single-file `.exe` — no installer needed.

            ### Requirements
            - Windows 10/11 x64
            - [VB-Audio Virtual Cable](https://vb-audio.com/Cable/) (free)

            ### Usage
            1. Download `VoiceShift.exe`
            2. Run it — appears in system tray
            3. Select your real mic as **Input**, VB-Cable as **Output**
            4. Adjust pitch / formant / robotic sliders
            5. Enable **Autostart** for persistent use
          files: dist/VoiceShift.exe
          draft: false
          prerelease: false

      - name: Upload artifact (non-tag builds)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: VoiceShift-exe
          path: dist/VoiceShift.exe
          retention-days: 14
